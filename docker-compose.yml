version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: github_actions

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - app-network


  backend:
    image: githubactions-backend:latest
    container_name: githubactions-backend

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/github_actions
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    networks:
      - app-network


  frontend:
    image: githubactions-frontend:latest
    container_name: githubactions-frontend

    depends_on:
      - backend

    ports:
      - "3000:80"

    networks:
      - app-network


volumes:

  postgres-data:


networks:

  app-network:
    driver: bridge