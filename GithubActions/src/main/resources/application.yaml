spring:
  application:
    name: GithubActions

  datasource:

    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/github_actions}

    username: ${SPRING_DATASOURCE_USERNAME:postgres}

    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

    driver-class-name: org.postgresql.Driver


  jpa:

    hibernate:
      ddl-auto: update

    show-sql: true
