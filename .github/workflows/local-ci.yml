name: Full Stack CI


on:
  push:
    branches:
      - main


jobs:


  backend-build:

    name: Build Spring Boot

    runs-on: ubuntu-latest


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'


      - name: Build Backend

        working-directory: GithubActions

        run: mvn clean package -DskipTests



  frontend-build:


    name: Build React

    runs-on: ubuntu-latest


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup Node

        uses: actions/setup-node@v4

        with:
          node-version: 22



      - name: Install dependencies

        working-directory: frontend

        run: npm install



      - name: Build React

        working-directory: frontend

        run: npm run build



  docker-build:


    name: Build Docker Images

    runs-on: ubuntu-latest


    needs:

      - backend-build
      - frontend-build



    steps:


      - name: Checkout code

        uses: actions/checkout@v4



      - name: Build Backend Image

        run:

          docker build \
          -t githubactions-backend \
          ./GithubActions



      - name: Build Frontend Image

        run:

          docker build \
          -t githubactions-frontend \
          ./frontend